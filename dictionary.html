    <script>
        function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        
        document.getElementById('dict-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchDictionary();
        });

        // The hidden Google Translate Dictionary API parser
        async function fetchGoogleDictionary(word, lang) {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&dt=md&dt=ss&sl=${lang}&tl=${lang}&q=${encodeURIComponent(word)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();
            
            const defsArray = data[12];
            const synsArray = data[11];
            
            if (!defsArray) throw new Error('Not found');
            
            const meanings = defsArray.map(posGroup => {
                const partOfSpeech = posGroup[0] || 'Definición';
                const defs = (posGroup[1] || []).map(d => {
                    let defStr = d[0] || '';
                    let exStr = '';
                    
                    // Filter out Google's internal ID codes by ensuring examples have spaces
                    if (typeof d[2] === 'string' && d[2].includes(' ')) {
                        exStr = d[2];
                    } else if (typeof d[1] === 'string' && d[1].includes(' ')) {
                        exStr = d[1];
                    }
                    
                    return {
                        definition: defStr,
                        example: exStr
                    };
                }).filter(d => d.definition);
                
                let synonyms = [];
                if (synsArray) {
                    const synGroup = synsArray.find(s => s[0] === partOfSpeech);
                    if (synGroup && synGroup[1]) {
                        synonyms = synGroup[1].flatMap(set => set[0] || []);
                    }
                }
                
                return {
                    partOfSpeech,
                    definitions: defs,
                    synonyms: [...new Set(synonyms)]
                };
            });
            
            return {
                word: (defsArray[0] && defsArray[0][2]) ? defsArray[0][2] : word,
                phonetics: [],
                meanings: meanings
            };
        }

        async function searchDictionary() {
            const rawWord = document.getElementById('dict-input').value.trim();
            const word = rawWord.toLowerCase();
            const lang = document.getElementById('dict-lang').value;
            const resContainer = document.getElementById('dict-results');
            const isEs = document.querySelector('.lang-option.active').getAttribute('data-lang') === 'es';

            if (!word) return;

            resContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: #D4AF37;"><div class="loading-dots" style="display:inline-flex; gap:5px;"><span style="width:7px; height:7px; background:#D4AF37; border-radius:50%; animation:bounce 1s infinite;"></span><span style="width:7px; height:7px; background:#D4AF37; border-radius:50%; animation:bounce 1s infinite 0.15s;"></span><span style="width:7px; height:7px; background:#D4AF37; border-radius:50%; animation:bounce 1s infinite 0.3s;"></span></div></div>';

            try {
                let finalData = null;

                if (lang === 'en') {
                    try {
                        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
                        if (!res.ok) throw new Error('Not found');
                        const data = await res.json();
                        finalData = data[0];
                    } catch (e) {
                        finalData = await fetchGoogleDictionary(word, 'en');
                    }
                } else {
                    finalData = await fetchGoogleDictionary(word, 'es');
                }

                renderDictResults(finalData, lang, isEs);
            } catch (err) {
                resContainer.innerHTML = `<div style="text-align:center; margin-top: 20px; color: #ff6060;">
                    ${isEs ? 'No encontramos la definición para esta palabra.' : 'We couldn\'t find definitions for this word.'}
                </div>`;
            }
        }

        function renderDictResults(data, langCode, isEs) {
            let audioUrl = '';
            if(data.phonetics) {
                const p = data.phonetics.find(x => x.audio);
                if(p) audioUrl = p.audio;
            }

            let html = `
                <div style="background: #cdc89e; border-radius: 12px; padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(26,26,62,0.1); padding-bottom: 15px; margin-bottom: 15px;">
                        <h2 style="color: #1a1a3e; font-size: 28px; margin: 0; text-transform: capitalize;">${escHtml(data.word)}</h2>
                        <button style="width: 45px; height: 45px; border-radius: 50%; background: #D4AF37; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);" onclick="playDictAudio('${audioUrl}', '${escHtml(data.word).replace(/'/g, "\\'")}', '${langCode}')">🔊</button>
                    </div>
            `;

            data.meanings.forEach(meaning => {
                html += `<h4 style="color: #9e7a0e; font-size: 16px; margin: 15px 0 10px; font-style: italic; text-transform: lowercase;">${escHtml(meaning.partOfSpeech)}</h4>`;

                meaning.definitions.slice(0, 3).forEach((def, i) => {
                    html += `<p style="color: #1a1a3e; font-size: 15px; font-weight: 400; margin-bottom: 5px; line-height: 1.4;"><strong>${i+1}.</strong> ${escHtml(def.definition)}</p>`;
                    if (def.example) {
                        html += `<p style="color: rgba(26,26,62,0.7); font-size: 14px; font-style: italic; margin-bottom: 12px; border-left: 2px solid #C9A227; padding-left: 10px;">"${escHtml(def.example)}"</p>`;
                    }
                });

                if (meaning.synonyms && meaning.synonyms.length > 0) {
                    html += `<p style="font-size: 14px; margin-top: 10px; color: #1a1a3e;"><strong>${isEs ? 'Sinónimos:' : 'Synonyms:'}</strong> <span style="color: #444;">${escHtml(meaning.synonyms.slice(0, 5).join(', '))}</span></p>`;
                }
            });

            html += `</div>`;
            document.getElementById('dict-results').innerHTML = html;
        }

        function playDictAudio(url, word, langCode) {
            if (url) {
                new Audio(url).play();
            } else {
                try {
                    const utter = new SpeechSynthesisUtterance(word);
                    utter.lang = langCode === 'es' ? 'es-ES' : 'en-GB';
                    window.speechSynthesis.speak(utter);
                } catch(e) {}
            }
        }
    </script>
