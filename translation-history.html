<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d24" />
  
  <title>Historial de Traducciones | Oxbridge English</title>
  <meta name="robots" content="noindex, follow">
  
  <link rel="icon" type="image/jpeg" href="ox-head-008.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --gold: #C9A227; --gold-light: #D4AF37; --navy: #0d0d24; --navy-light: #1a1a3e;
      --cream: #cdc89e; --text-navy: #1a1a3e; --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--navy); color: white; font-family: 'Roboto', sans-serif; font-weight: 300; }
    
    .app { display: flex; flex-direction: column; min-height: 100vh; padding-top: var(--safe-top); }

    .topbar { 
        display: flex; align-items: center; justify-content: space-between; 
        padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); 
    }
    .back-btn {
      background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
      color: var(--text-navy); border: none; border-radius: 50px; padding: 8px 16px; font-weight: 700; cursor: pointer;
    }

    .toolbar { display: flex; gap: 10px; padding: 15px 16px; justify-content: flex-end; }
    .btn-action { border: none; border-radius: 50px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; color: white; }
    .btn-delete { background: #cc2020; }
    .btn-quiz { background: var(--gold); color: var(--text-navy); text-decoration: none; }

    .content { flex: 1; padding: 0 16px 20px; }
    
    .history-entry {
      background: var(--cream); border-radius: 14px; padding: 16px; margin-bottom: 12px;
      transition: all 0.2s; border: 3px solid transparent; cursor: pointer;
    }
    .history-entry.selected { border-color: var(--gold); background: #e0dbb5; }
    
    .entry-header { display: flex; justify-content: space-between; font-size: 12px; color: rgba(26,26,62,0.5); margin-bottom: 8px; }
    .entry-original { font-size: 16px; font-weight: 500; color: var(--text-navy); margin-bottom: 5px; }
    .entry-translation { font-size: 16px; color: rgba(26,26,62,0.8); }

    .play-btn { 
        margin-top: 10px; background: rgba(201, 162, 39, 0.2); border: 1px solid var(--gold); 
        color: var(--text-navy); padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 30px;
      opacity: 0; transition: 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="ox-head-008.jpg" style="width:30px; height:30px; border-radius:50%;">
        <strong>Oxbridge English</strong>
    </div>
    <button class="back-btn" onclick="location.href='translator.html'">← Volver</button>
  </div>

  <div class="toolbar">
    <button class="btn-action btn-delete" onclick="handleDelete()">🗑 Borrar</button>
    <a href="translation-quiz.html" class="btn-action btn-quiz">🧠 Quiz</a>
  </div>

  <div class="content" id="history-list">
    </div>

  <div id="toast" class="toast"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, deleteDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDyaVRdsqozHWlXIZ-zVdlq2VzTNrsuJc4",
    authDomain: "oxbridge-english-a3cc3.firebaseapp.com",
    projectId: "oxbridge-english-a3cc3",
    storageBucket: "oxbridge-english-a3cc3.firebasestorage.app",
    messagingSenderId: "508505970812",
    appId: "1:508505970812:web:51b46ce56f5d96c28091f9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.db = db;
  window.auth = auth;
  window.dbFunctions = { doc, deleteDoc, getDocs, collection, query, where };

  onAuthStateChanged(auth, (user) => {
    window.userUid = user ? user.uid : null;
    loadHistory();
  });
</script>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function loadHistory() {
    const list = document.getElementById('history-list');
    // We use 'app_history' to match your Android local data name
    const history = JSON.parse(localStorage.getItem('app_history') || '[]');
    
    if (history.length === 0) {
      list.innerHTML = '<div style="text-align:center; padding-top:50px; opacity:0.5;">No hay historial aún.</div>';
      return;
    }

    list.innerHTML = history.map((entry, index) => `
      <div class="history-entry" onclick="this.classList.toggle('selected')" data-index="${index}" data-session="${entry.sessionId}">
        <div class="entry-header">
          <span>${entry.dir === 'es-en' ? 'ES → EN' : 'EN → ES'}</span>
          <span>${new Date(entry.timestamp).toLocaleDateString()}</span>
        </div>
        <div class="entry-original">${entry.original}</div>
        <div class="entry-translation">${entry.translation}</div>
        <button class="play-btn" onclick="event.stopPropagation(); playAudio('${entry.translation.replace(/'/g, "\\'")}', '${entry.dir === 'es-en' ? 'en' : 'es'}')">
            <i class="fas fa-volume-up"></i> Escuchar
        </button>
      </div>
    `).join('');
  }

  async function handleDelete() {
    const selected = document.querySelectorAll('.history-entry.selected');
    if (selected.length === 0) {
        showToast("Selecciona elementos primero");
        return;
    }

    if (!confirm(`¿Borrar ${selected.length} elementos?`)) return;

    let history = JSON.parse(localStorage.getItem('app_history') || '[]');
    let cloudDeletePromises = [];

    selected.forEach(el => {
      const session = el.getAttribute('data-session');
      const index = parseInt(el.getAttribute('data-index'));

      // 1. Remove from Local
      history = history.filter(item => item.sessionId !== session);

      // 2. Remove from Cloud (Ghost Busting)
      if (window.userUid && window.db) {
        const docId = `${window.userUid}_${session}`;
        const docRef = window.dbFunctions.doc(window.db, "translations_history", docId);
        cloudDeletePromises.push(window.dbFunctions.deleteDoc(docRef));
      }
    });

    localStorage.setItem('app_history', JSON.stringify(history));
    
    if (cloudDeletePromises.length > 0) {
        showToast("Borrando de la nube...");
        await Promise.all(cloudDeletePromises);
    }

    showToast("Eliminado con éxito");
    loadHistory();
  }

  function playAudio(text, lang) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang === 'en' ? 'en-US' : 'es-ES';
    window.speechSynthesis.speak(utter);
  }

  // Handle back button specifically for web to avoid weird loops
  window.goBack = () => {
    window.location.href = 'translator.html';
  };
</script>

</body>
</html>
