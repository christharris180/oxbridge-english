    <!-- Firebase SDK & Auth Listener -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, deleteDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyaVRdsqozHWlXIZ-zVdlq2VzTNrsuJc4",
            authDomain: "oxbridge-english-a3cc3.firebaseapp.com",
            projectId: "oxbridge-english-a3cc3",
            storageBucket: "oxbridge-english-a3cc3.firebasestorage.app",
            messagingSenderId: "508505970812",
            appId: "1:508505970812:web:51b46ce56f5d96c28091f9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.cloudProvider = new GoogleAuthProvider();

        window.db = db;
        window.cloudAuth = auth;
        window.dbFunctions = { doc, deleteDoc, getDocs, collection, query, where };

        onAuthStateChanged(auth, (user) => {
            const profileLabel = document.getElementById('profile-label');
            const profileIcon = document.getElementById('profile-icon');
            
            if (user) {
                const googleProvider = user.providerData.find(p => p.providerId === 'google.com');
                window.userUid = googleProvider ? googleProvider.uid : user.uid;
                
                if(profileLabel) profileLabel.textContent = user.displayName.split(' ')[0];
                if(profileIcon) {
                    profileIcon.style.background = '#4caf50';
                    profileIcon.style.color = 'white';
                    profileIcon.style.borderColor = '#2e7d32';
                }
            } else {
                window.userUid = null;
                if(profileLabel) profileLabel.textContent = "Log In";
                if(profileIcon) {
                    profileIcon.style.background = 'rgba(212, 175, 55, 0.15)';
                    profileIcon.style.color = '#D4AF37';
                    profileIcon.style.borderColor = '#D4AF37';
                }
            }
            loadHistory();
        });

        window.handleLogin = async function() {
            if (window.userUid) {
                if(confirm(window.uiLang === 'es' ? '¿Cerrar sesión?' : 'Sign out?')) {
                    await signOut(window.cloudAuth);
                }
            } else {
                try {
                    await signInWithPopup(window.cloudAuth, window.cloudProvider);
                } catch(e) { console.log("Login failed", e); }
            }
        };
    </script>

    <!-- History Engine Logic -->
    <script>
        let uiLang = localStorage.getItem('preferredLanguage') || 'en';

        // Listen for the global toggle in script.js and re-render history with correct labels
        document.addEventListener('languageChanged', (e) => {
            uiLang = e.detail;
            loadHistory();
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; 
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function loadHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('app_history') || '[]');
            
            if (history.length === 0) {
              list.innerHTML = `<div style="text-align:center; padding-top:100px; color:#1a1a3e; opacity:0.6; font-size:18px;">${uiLang === 'es' ? 'El historial está vacío' : 'History is empty'}</div>`;
              return;
            }

            list.innerHTML = history.map((entry, index) => {
                const audioLang = entry.dir === 'es-en' ? 'en' : 'es';
                const cleanWord = entry.translation.replace(/'/g, "\\'");
                const listenText = uiLang === 'es' ? 'Escuchar' : 'Listen';
                
                return `
                <div class="history-entry" onclick="this.classList.toggle('selected')" data-index="${index}" data-session="${entry.sessionId}">
                    <div class="entry-header">
                        <span>${entry.dir === 'es-en' ? 'ES → EN' : 'EN → ES'}</span>
                        <span>${new Date(entry.timestamp).toLocaleDateString()}</span>
                    </div>
                    <div class="entry-original">${entry.original}</div>
                    <div class="entry-translation">${entry.translation}</div>
                    <button class="play-btn" onclick="event.stopPropagation(); playAudio('${cleanWord}', '${audioLang}')">
                        <i class="fas fa-volume-up"></i> ${listenText}
                    </button>
                </div>
                `;
            }).join('');
        }

        async function handleDelete() {
            const selected = document.querySelectorAll('.history-entry.selected');
            if (selected.length === 0) {
                showToast(uiLang === 'es' ? "Selecciona elementos primero" : "Select items first");
                return;
            }

            if (!confirm(uiLang === 'es' ? `¿Borrar ${selected.length} elementos?` : `Delete ${selected.length} items?`)) return;

            let history = JSON.parse(localStorage.getItem('app_history') || '[]');
            let cloudDeletePromises = [];

            selected.forEach(el => {
                const session = el.getAttribute('data-session');
                // Remove from Local
                history = history.filter(item => item.sessionId !== session);

                // Remove from Cloud (Ghost Busting)
                if (window.userUid && window.db) {
                    const docId = `${window.userUid}_${session}`;
                    const docRef = window.dbFunctions.doc(window.db, "translations_history", docId);
                    cloudDeletePromises.push(window.dbFunctions.deleteDoc(docRef));
                }
            });

            localStorage.setItem('app_history', JSON.stringify(history));
            
            if (cloudDeletePromises.length > 0) {
                showToast(uiLang === 'es' ? "Borrando de la nube..." : "Deleting from cloud...");
                await Promise.all(cloudDeletePromises).catch(e => console.log(e));
            }

            showToast(uiLang === 'es' ? "Eliminado con éxito" : "Successfully deleted");
            loadHistory();
        }

        // Uses the physical HTML audio tag to bypass mobile autoplay blockers
        function playAudio(word, langCode) {
            const audioUrl = "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=" + langCode + "&q=" + encodeURIComponent(word);
            const player = document.getElementById('tts-player');
            
            if (player) {
                player.pause();
                player.src = audioUrl;
                player.load();
                player.play().catch(e => {
                    console.error("Audio prevented by browser policy", e);
                    showToast(uiLang === 'es' ? 'Sube el volumen o permite el audio' : 'Turn up volume or allow audio');
                });
            }
        }
    </script>
