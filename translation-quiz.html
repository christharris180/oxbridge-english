<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SmarTranslator Quiz | Oxbridge English</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C9A227; --gold-light: #D4AF37; --navy: #0d0d24; --navy-light: #1a1a3e;
            --cream: #cdc89e; --text-navy: #1a1a3e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--navy); color: white; font-family: 'Roboto', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column;
        }
        
        .topbar { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); 
        }
        .back-btn {
            background: var(--gold); color: var(--text-navy); border: none; 
            border-radius: 50px; padding: 8px 16px; font-weight: 700; cursor: pointer;
        }

        .quiz-container { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #quiz-score-header { font-size: 18px; color: var(--gold); margin-bottom: 20px; font-weight: 500; }

        /* Scramble Mode Styles */
        #scramble-answer-box { 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; 
            min-height: 60px; width: 100%; margin-bottom: 20px; padding: 15px; 
            background: rgba(255,255,255,0.05); border-radius: 12px; border: 2px dashed var(--gold);
        }
        .scramble-btn { 
            background: var(--navy-light); border: 1px solid var(--gold); color: white; 
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 16px;
        }

        /* Option Buttons (Multiple Choice) */
        .option-btn {
            width: 100%; background: var(--navy-light); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        .option-btn.correct { background: #2e7d32 !important; border-color: #4caf50; }
        .option-btn.wrong { background: #c62828 !important; border-color: #ef5350; }

        .mic-btn-quiz {
            width: 100px; height: 100px; border-radius: 50%; background: var(--gold);
            border: none; font-size: 40px; cursor: pointer; box-shadow: 0 4px 15px rgba(201,162,39,0.4);
        }
        .mic-btn-quiz.listening { background: #cc2020; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .next-btn {
            margin-top: 30px; background: var(--gold); color: var(--text-navy);
            border: none; border-radius: 50px; padding: 12px 40px; font-weight: 700;
            display: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="topbar">
    <strong>Oxbridge English Quiz</strong>
    <button class="back-btn" onclick="location.href='translator.html'">← Salir</button>
</div>

<div class="quiz-container">
    <div id="quiz-score-header">Pregunta 1 / 10</div>
    <div id="quiz-content" style="width: 100%; max-width: 500px;">
        </div>
    <button id="next-btn" class="next-btn" onclick="nextQuestion()">Siguiente ➔</button>
</div>

<audio id="tts-player" style="display:none;"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDyaVRdsqozHWlXIZ-zVdlq2VzTNrsuJc4",
        authDomain: "oxbridge-english-a3cc3.firebaseapp.com",
        projectId: "oxbridge-english-a3cc3",
        storageBucket: "oxbridge-english-a3cc3.firebasestorage.app",
        messagingSenderId: "508505970812",
        appId: "1:508505970812:web:51b46ce56f5d96c28091f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.db = db;
    window.auth = auth;
    window.dbSet = setDoc;
    window.dbDoc = doc;

    onAuthStateChanged(auth, (user) => {
        window.userUid = user ? user.uid : null;
        initQuiz();
    });
</script>

<script>
    let history = [];
    let state = { score: 0, current: 0, total: 10, currentItem: null, isAnswering: false };

    function initQuiz() {
        history = JSON.parse(localStorage.getItem('app_history') || '[]');
        if (history.length < 20) {
            document.getElementById('quiz-content').innerHTML = `
                <div style="text-align:center; padding-top:50px;">
                    <h2 style="color:var(--gold)">Faltan palabras</h2>
                    <p>Necesitas al menos 20 traducciones en tu historial para jugar. (Tienes ${history.length})</p>
                    <br><a href="translator.html" class="back-btn" style="text-decoration:none">Ir a traducir</a>
                </div>`;
            document.getElementById('quiz-score-header').style.display = 'none';
            return;
        }
        nextQuestion();
    }

    function nextQuestion() {
        if (state.current >= state.total) {
            showResults();
            return;
        }
        
        state.isAnswering = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('quiz-score-header').textContent = `Pregunta ${state.current + 1} / ${state.total}`;
        
        // Select random item
        state.currentItem = history[Math.floor(Math.random() * history.length)];
        
        // Pick a mode (0: Multi Choice, 1: Listening, 2: Voice, 3: Scramble)
        const mode = Math.floor(Math.random() * 4);
        renderMode(mode);
    }

    function renderMode(mode) {
        const container = document.getElementById('quiz-content');
        let html = '';

        if (mode === 3) { // Scramble
            let words = state.currentItem.translation.split(' ').sort(() => Math.random() - 0.5);
            html = `<p style="text-align:center; margin-bottom:15px; opacity:0.7;">Ordena la frase:</p>
                    <h3 style="text-align:center; margin-bottom:20px;">"${state.currentItem.original}"</h3>
                    <div id="scramble-answer-box"></div>
                    <div id="scramble-pool" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">
                        ${words.map(w => `<button class="scramble-btn" onclick="handleScramble(this)">${w}</button>`).join('')}
                    </div>`;
        } else if (mode === 2) { // Voice
            html = `<div style="text-align:center;">
                        <p style="margin-bottom:20px; opacity:0.7;">Pronuncia la traducción:</p>
                        <h2 style="margin-bottom:40px;">"${state.currentItem.original}"</h2>
                        <button id="quiz-mic" class="mic-btn-quiz" onclick="startVoiceQuiz()">🎤</button>
                        <p id="voice-feedback" style="margin-top:20px;"></p>
                    </div>`;
        } else { // Multi-Choice (Visual or Listening)
            const options = [state.currentItem.translation];
            while(options.length < 4) {
                let rand = history[Math.floor(Math.random() * history.length)].translation;
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            html = `<div style="text-align:center;">
                        ${mode === 1 ? `<button class="mic-btn-quiz" onclick="playCurrent()">🔊</button>` : `<h2>"${state.currentItem.original}"</h2>`}
                        <div style="margin-top:30px;">
                            ${options.map(opt => `<button class="option-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
                        </div>
                    </div>`;
            if(mode === 1) setTimeout(playCurrent, 500);
        }

        container.innerHTML = html;
    }

    function handleScramble(btn) {
        const box = document.getElementById('scramble-answer-box');
        const pool = document.getElementById('scramble-pool');
        if (btn.parentElement.id === 'scramble-pool') box.appendChild(btn);
        else pool.appendChild(btn);

        if (pool.children.length === 0) {
            const result = Array.from(box.children).map(b => b.textContent).join(' ');
            if (result.toLowerCase() === state.currentItem.translation.toLowerCase()) {
                state.score++;
                box.style.borderColor = "#4caf50";
                finishStep();
            } else {
                box.style.borderColor = "#f44336";
                finishStep();
            }
        }
    }

    function checkAnswer(btn, value) {
        if (state.isAnswering) return;
        state.isAnswering = true;
        
        if (value === state.currentItem.translation) {
            btn.classList.add('correct');
            state.score++;
        } else {
            btn.classList.add('wrong');
        }
        finishStep();
    }

    function finishStep() {
        state.current++;
        document.getElementById('next-btn').style.display = 'block';
        // Update Mastery in Cloud
        if (window.userUid && window.db) {
            const docRef = window.dbDoc(window.db, "translations_history", `${window.userUid}_${state.currentItem.sessionId}`);
            window.dbSet(docRef, { mastery: 1 }, { merge: true }).catch(() => {});
        }
    }

    function playCurrent() {
        const lang = state.currentItem.dir === 'es-en' ? 'en' : 'es';
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${lang}&q=${encodeURIComponent(state.currentItem.translation)}`;
        const p = document.getElementById('tts-player');
        p.src = url; p.play();
    }

    function startVoiceQuiz() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Voz no soportada en este navegador");
        
        const rec = new SpeechRecognition();
        rec.lang = state.currentItem.dir === 'es-en' ? 'en-US' : 'es-ES';
        const btn = document.getElementById('quiz-mic');
        
        rec.onstart = () => btn.classList.add('listening');
        rec.onresult = (e) => {
            const talk = e.results[0][0].transcript.toLowerCase();
            const target = state.currentItem.translation.toLowerCase();
            document.getElementById('voice-feedback').textContent = `Dijiste: "${talk}"`;
            if (talk.includes(target) || target.includes(talk)) {
                state.score++;
                btn.style.background = "#2e7d32";
            } else {
                btn.style.background = "#c62828";
            }
            finishStep();
        };
        rec.onend = () => btn.classList.remove('listening');
        rec.start();
    }

    function showResults() {
        const container = document.getElementById('quiz-content');
        container.innerHTML = `
            <div style="text-align:center;">
                <h1 style="font-size:60px;">${state.score > 7 ? '🎉' : '💪'}</h1>
                <h2>¡Quiz Terminado!</h2>
                <p style="font-size:24px; margin:20px 0;">Puntuación: ${state.score} / ${state.total}</p>
                <button class="back-btn" onclick="location.reload()">Jugar de nuevo</button>
            </div>`;
        document.getElementById('quiz-score-header').style.display = 'none';
    }
</script>

</body>
</html>
