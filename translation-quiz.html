    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #e8c412;
            --navy: #0d0d24;
            --navy-light: #1a1a3e;
            --cream: #cdc89e;

        .quiz-wrapper {
            padding: 40px 20px;
            min-height: calc(100vh - 200px);
            display: flex;
            justify-content: center;
        }

        .quiz-panel {
            background: var(--cream);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
            color: var(--text-navy);
            width: 100%;
            max-width: 700px;
            min-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(26,26,62,0.1);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .quiz-header h2 {
            color: var(--text-navy);
            margin: 0;
            font-family: 'Work Sans', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }

        .back-btn {
            background: rgba(26, 26, 62, 0.1);
            color: var(--text-navy);
            border: 1px solid rgba(26, 26, 62, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--navy-light);
            color: white;
        }

        #quiz-score {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-navy);
        }

        #quiz-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .quiz-option-btn {
            background: #ffffff;
            border: 2px solid rgba(26,26,62,0.1);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-navy);
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 12px;
            font-family: 'Roboto', sans-serif;
            text-align: center;
        }

        .quiz-option-btn:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(13,13,36,0.96);
            border: 1px solid var(--gold);
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 16px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        @media (max-width: 480px) {
            .quiz-panel { padding: 20px; }
            .quiz-header h2 { font-size: 22px; }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyaVRdsqozHWlXIZ-zVdlq2VzTNrsuJc4",
            authDomain: "oxbridge-english-a3cc3.firebaseapp.com",
            projectId: "oxbridge-english-a3cc3",
            storageBucket: "oxbridge-english-a3cc3.firebasestorage.app",
            messagingSenderId: "508505970812",
            appId: "1:508505970812:web:51b46ce56f5d96c28091f9"
        };

        const app = initializeApp(firebaseConfig);
        window.cloudDb = getFirestore(app);
        window.cloudDoc = doc;
        window.cloudSetDoc = setDoc;

        onAuthStateChanged(getAuth(app), (user) => {
            if (user) {
                const googleProvider = user.providerData.find(p => p.providerId === 'google.com');
                window.userUid = googleProvider ? googleProvider.uid : user.uid;
            } else {
                window.userUid = null;
            }
        });
    </script>

    <script>
        window.uiLang = localStorage.getItem('preferredLanguage') || 'en';
        window.quizState = { score: 0, currentQuestion: 0, maxQuestions: 10, usedWords: [], currentItem: null, isAnswering: false, hasFailedCurrent: false };

        window.escHtml = function(str) { 
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
        };

        window.showToast = function(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        };

        // FIXED AUDIO: Bypasses mobile restrictions by generating audio object directly
        window.playDictAudio = function(word, langCode) {
            const audioUrl = "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=" + langCode + "&q=" + encodeURIComponent(word);
            const audio = new Audio(audioUrl);
            audio.play().catch(e => {
                console.error("Audio prevented by browser policy", e);
                window.showToast(window.uiLang === 'es' ? 'Sube el volumen o permite el audio' : 'Turn up volume or allow audio');
            });
        };

        window.updateCloudMastery = async function(item) {
            if (window.userUid && window.cloudDb && window.cloudSetDoc) {
                const docId = window.userUid + "_" + item.sessionId;
                const docRef = window.cloudDoc(window.cloudDb, "translations_history", docId);
                try {
                    await window.cloudSetDoc(docRef, { mastery: item.mastery }, { merge: true });
                } catch(e) { console.error("Cloud mastery update failed", e); }
            }
        };

        window.quizGoNext = function() {
            window.nextQuizQuestion();
        };

        window.handleScrambleClick = function(btn) {
            if (window.quizState.isAnswering) return; 

            const answerBox = document.getElementById('scramble-answer-box');
            const poolBox = document.getElementById('scramble-word-pool');

            if (btn.parentElement.id === 'scramble-word-pool') {
                answerBox.appendChild(btn);
            } else {
                poolBox.appendChild(btn);
            }

            if (poolBox.querySelectorAll('button').length === 0) {
                let userWords = Array.from(answerBox.children).map(b => b.textContent).join(' ');
                let cleanTarget = window.quizState.currentItem.translation.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,?!¿¡'"-]/g, " ").replace(/\s+/g, " ").trim().toLowerCase();
                let cleanUser = userWords.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,?!¿¡'"-]/g, " ").replace(/\s+/g, " ").trim().toLowerCase();

                if (cleanUser === cleanTarget) {
                    Array.from(answerBox.children).forEach(b => { b.style.background = '#2e7d32'; b.style.borderColor = '#4caf50'; b.style.color = 'white'; });
                    window.checkQuizAnswer(null, true);
                } else {
                    Array.from(answerBox.children).forEach(b => { b.style.background = '#c62828'; b.style.borderColor = '#ef5350'; b.style.color = 'white'; });
                    let p = document.createElement('p');
                    p.style.color = "var(--navy-light)";
                    p.style.fontWeight = "bold";
                    p.style.width = "100%";
                    p.style.marginTop = "15px";
                    p.style.fontSize = "18px";
                    p.style.textAlign = "center";
                    p.innerHTML = `✅ ${window.escHtml(window.quizState.currentItem.translation)}`;
                    poolBox.appendChild(p);
                    window.checkQuizAnswer(null, false);
                }
            }
        };

        window.nextQuizQuestion = function() {
            window.quizState.isAnswering = false;
            window.quizState.hasFailedCurrent = false;

            if (window.quizState.currentQuestion >= window.quizState.maxQuestions) {
                window.showQuizResults();
                return;
            }

            let history = JSON.parse(localStorage.getItem('app_history') || '[]');
            history.forEach(item => { if(item.mastery === undefined) item.mastery = 0; });
            const container = document.getElementById('quiz-content');

            let availableWords = history.filter(item => 
                !window.quizState.usedWords.includes(item.original) &&
                item.original.trim().toLowerCase() !== item.translation.trim().toLowerCase()
            );
            
            availableWords.sort((a, b) => a.mastery - b.mastery);
            let strugglePile = availableWords.slice(0, 15);
            
            if (strugglePile.length === 0) {
                container.innerHTML = `
                    <div style="font-size:70px; margin-bottom:20px; text-align:center;">🧠</div>
                    <h3 style="color:var(--text-navy); text-align:center; font-size:22px;">${window.uiLang === 'es' ? 'Necesitas más palabras' : 'Need more words'}</h3>
                    <p style="text-align:center; color:rgba(26,26,62,0.8); margin-top:10px; font-size:16px;">
                        ${window.uiLang === 'es' ? 'Para jugar al quiz, necesitas al menos 20 traducciones válidas en tu historial.' : 'To play the quiz, you need at least 20 valid translations in your history.'}
                    </p>
                `;
                document.getElementById('quiz-score').style.display = 'none';
                return;
            }

            const correctItem = strugglePile[Math.floor(Math.random() * strugglePile.length)];
            window.quizState.usedWords.push(correctItem.original);
            window.quizState.currentItem = correctItem;

            let quizMode = Math.floor(Math.random() * 5);
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (quizMode === 2 && !SpeechRecognition) quizMode = 0;

            const translationWords = correctItem.translation.trim().split(/\s+/);
            if (quizMode === 3 && translationWords.length < 3) quizMode = 0; 
            
            let cleanSentenceForScramble = correctItem.translation.replace(/[.,?!¿¡'"-]/g, " ").replace(/\s+/g, " ").trim();
            let scrambleWords = cleanSentenceForScramble.split(" ");
            if (quizMode === 4 && scrambleWords.length < 3) quizMode = 0;

            document.getElementById('quiz-score').textContent = 
                (window.uiLang === 'es' ? 'Pregunta ' : 'Question ') + 
                (window.quizState.currentQuestion + 1) + ' / ' + window.quizState.maxQuestions;

            let html = `<div style="text-align:center; width:100%; animation: fadeIn 0.3s ease-out; max-width: 500px;">`;

            if (quizMode === 4) {
                let shuffled = [...scrambleWords].sort(() => Math.random() - 0.5);
                if (shuffled.join(" ") === cleanSentenceForScramble && scrambleWords.length > 1) {
                    shuffled.reverse(); 
                }

                html += `<p style="color:rgba(26,26,62,0.7); font-weight:600; font-size:16px; margin-bottom:10px;">${window.uiLang === 'es' ? 'Ordena las palabras:' : 'Order the words:'}</p>
                         <p style="color:var(--text-navy); font-size:20px; font-weight:bold; margin-bottom:20px; font-style:italic;">"${window.escHtml(correctItem.original)}"</p>
                         <div id="scramble-answer-box" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:56px; margin-bottom:20px; padding:10px; background:rgba(255,255,255,0.5); border-radius:12px; border:2px dashed rgba(26,26,62,0.3);"></div>
                         <div id="scramble-word-pool" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:56px;">`;
                         
                shuffled.forEach((w) => {
                    html += `<button onclick="window.handleScrambleClick(this)" style="background:var(--navy-light); border:1px solid var(--gold); border-radius:8px; padding:10px 16px; color:white; font-size:18px; cursor:pointer; transition:transform 0.1s;">${window.escHtml(w)}</button>`;
                });
                html += `</div>`;
            }
            else if (quizMode === 3) {
                let candidates = translationWords.filter(w => w.replace(/[^a-zA-ZáéíóúñüÁÉÍÓÚÑÜ'-]/g, '').length >= 4);
                if(candidates.length === 0) candidates = translationWords.filter(w => w.replace(/[^a-zA-ZáéíóúñüÁÉÍÓÚÑÜ'-]/g, '').length >= 2);
                if(candidates.length === 0) candidates = translationWords;

                let wordToBlankRaw = candidates[Math.floor(Math.random() * candidates.length)];
                let clozeAnswer = wordToBlankRaw.replace(/[^a-zA-ZáéíóúñüÁÉÍÓÚÑÜ'-]/g, ''); 
                let blankedSentence = correctItem.translation.replace(wordToBlankRaw, "________");

                let allOtherWords = new Set();
                history.forEach(item => {
                    if(item.dir === correctItem.dir) {
                        let wArr = item.translation.trim().split(/\s+/);
                        wArr.forEach(w => {
                            let cl = w.replace(/[^a-zA-ZáéíóúñüÁÉÍÓÚÑÜ'-]/g, '');
                            if (cl.length > 2 && cl.toLowerCase() !== clozeAnswer.toLowerCase()) {
                                allOtherWords.add(cl);
                            }
                        });
                    }
                });

                let allOtherWordsArr = Array.from(allOtherWords).sort(() => Math.random() - 0.5);
                let clozeOptions = [clozeAnswer];
                while(clozeOptions.length < 4 && allOtherWordsArr.length > 0) {
                    clozeOptions.push(allOtherWordsArr.pop());
                }
                clozeOptions.sort(() => Math.random() - 0.5);

                html += `<p style="color:rgba(26,26,62,0.7); font-weight:600; font-size:16px; margin-bottom:10px;">${window.uiLang === 'es' ? 'Completa la frase:' : 'Fill in the blank:'}</p>
                         <p style="color:var(--text-navy); font-size:18px; margin-bottom:15px; font-style:italic;">"${window.escHtml(correctItem.original)}"</p>
                         <h2 style="color:var(--text-navy); font-size:28px; margin-bottom:30px; word-wrap: break-word;">${window.escHtml(blankedSentence)}</h2>
                         <div style="display:flex; flex-direction:column; gap:12px;">`;
                         
                clozeOptions.forEach((opt) => {
                    const isCorrect = (opt === clozeAnswer);
                    html += `<button class="quiz-option-btn" onclick="window.checkQuizAnswer(this, ${isCorrect})">${window.escHtml(opt)}</button>`;
                });
                html += `</div>`;
            }
            else {
                const matchingHistory = history.filter(item => 
                    item.dir === correctItem.dir && 
                    item.original.trim().toLowerCase() !== item.translation.trim().toLowerCase()
                );

                let options = [correctItem];
                let attempts = 0;
                while(options.length < 4 && attempts < 200) {
                    const randomItem = matchingHistory[Math.floor(Math.random() * matchingHistory.length)];
                    if (!randomItem) break; 
                    
                    if (quizMode === 1) {
                        if(!options.find(o => o.original === randomItem.original)) options.push(randomItem);
                    } else {
                        if(!options.find(o => o.translation === randomItem.translation)) options.push(randomItem);
                    }
                    attempts++;
                }
                options.sort(() => Math.random() - 0.5); 

                if (quizMode === 0) { 
                    html += `<p style="color:rgba(26,26,62,0.7); font-weight:600; font-size:16px; margin-bottom:10px;">${window.uiLang === 'es' ? '¿Cómo se dice:' : 'How do you say:'}</p>
                             <h2 style="color:var(--text-navy); font-size:28px; margin-bottom:30px; word-wrap: break-word;">"${window.escHtml(correctItem.original)}"</h2>
                             <div style="display:flex; flex-direction:column; gap:12px;">`;
                    options.forEach((opt) => {
                        const isCorrect = opt.translation === correctItem.translation;
                        html += `<button class="quiz-option-btn" onclick="window.checkQuizAnswer(this, ${isCorrect})">${window.escHtml(opt.translation)}</button>`;
                    });
                    html += `</div>`;
                } 
                else if (quizMode === 1) {
                    const audioLang = correctItem.dir === 'es-en' ? 'en' : 'es';
                    const cleanWord = correctItem.translation.replace(/'/g, "\\'");
                    html += `<p style="color:rgba(26,26,62,0.7); font-weight:600; font-size:16px; margin-bottom:10px;">${window.uiLang === 'es' ? 'Escucha y selecciona el significado:' : 'Listen and select the meaning:'}</p>
                             <button onclick="window.playDictAudio('${cleanWord}', '${audioLang}')" style="background:var(--gold); border:none; border-radius:50%; width:90px; height:90px; font-size:45px; margin-bottom:30px; cursor:pointer; box-shadow: 0 4px 15px rgba(201,162,39,0.4);">🔊</button>
                             <div style="display:flex; flex-direction:column; gap:12px;">`;
                    options.forEach((opt) => {
                        const isCorrect = opt.original === correctItem.original;
                        html += `<button class="quiz-option-btn" onclick="window.checkQuizAnswer(this, ${isCorrect})">${window.escHtml(opt.original)}</button>`;
                    });
                    html += `</div>`;
                    
                    // Delay slightly before attempting auto-play
                    setTimeout(() => window.playDictAudio(cleanWord, audioLang), 600);
                } 
                else if (quizMode === 2) {
                    html += `<p style="color:rgba(26,26,62,0.7); font-weight:600; font-size:16px; margin-bottom:10px;">${window.uiLang === 'es' ? 'Toca el micrófono y di la traducción:' : 'Tap the mic and say the translation:'}</p>
                             <h2 style="color:var(--text-navy); font-size:28px; margin-bottom:20px; word-wrap: break-word;">"${window.escHtml(correctItem.original)}"</h2>
                             
                             <div id="quiz-result-heading" style="font-size:24px; font-weight:bold; height:35px; margin-bottom:10px;"></div>
                             
                             <button id="quiz-mic-btn" onclick="window.startQuizMic()" style="background:var(--gold); border:none; border-radius:50%; width:100px; height:100px; font-size:50px; margin-bottom:15px; cursor:pointer; box-shadow: 0 4px 15px rgba(201,162,39,0.4); transition:all 0.3s;">🎤</button>
                             
                             <div id="quiz-voice-feedback" style="min-height:90px; margin-top:10px; color:var(--text-navy);"></div>
                             
                             <button id="quiz-skip-btn" onclick="window.checkQuizAnswer(null, false)" style="display:none; background:transparent; color:#cc2020; border:none; font-size:16px; margin-top:15px; text-decoration:underline; cursor:pointer;"></button>`;
                }
            }

            html += `<div style="margin-top:25px;">
                        <button id="quiz-next-btn" onclick="window.quizGoNext()" style="display:none; background:linear-gradient(180deg, var(--navy-light) 0%, var(--navy) 100%); border:none; border-radius:30px; padding:12px 40px; font-size:18px; color:white; font-weight:700; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.3);">
                            ${window.uiLang === 'es' ? 'Siguiente' : 'Next'} ➔
                        </button>
                     </div>`;

            html += `</div>`;
            container.innerHTML = html;
        };

        window.startQuizMic = async function() {
            if (window.quizState.isAnswering) return;

            const btn = document.getElementById('quiz-mic-btn');
            btn.style.background = '#cc2020'; 
            btn.innerText = '🎙️';
            
            document.getElementById('quiz-result-heading').innerHTML = '';
            document.getElementById('quiz-voice-feedback').innerHTML = '';

            const langCode = window.quizState.currentItem.dir === 'es-en' ? 'en-US' : 'es-ES';
            
            const normalizeText = (text) => {
                if (!text) return "";
                return text.toLowerCase()
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                    .replace(/can't/g, "cannot").replace(/won't/g, "will not").replace(/n't/g, " not")
                    .replace(/'m/g, " am").replace(/'re/g, " are").replace(/'ll/g, " will")
                    .replace(/'ve/g, " have").replace(/'d/g, " would")
                    .replace(/it's/g, "it is").replace(/that's/g, "that is")
                    .replace(/he's/g, "he is").replace(/she's/g, "she is")
                    .replace(/you're/g, "you are").replace(/we're/g, "we are").replace(/they're/g, "they are")
                    .replace(/\bplain\b/g, "plane")
                    .replace(/\bkids\b/g, "children").replace(/\bkid\b/g, "child")
                    .replace(/\bhi\b/g, "hello").replace(/\bhey\b/g, "hello")
                    .replace(/\bbye\b/g, "goodbye").replace(/\btv\b/g, "television")
                    .replace(/\bphoto\b/g, "photograph").replace(/\bbike\b/g, "bicycle")
                    .replace(/\byeah\b/g, "yes").replace(/\byep\b/g, "yes").replace(/\bokay\b/g, "ok")
                    .replace(/[.,?!¿¡'"-]/g, " ") 
                    .replace(/\s+/g, " ") 
                    .trim();
            };

            const targetTextClean = normalizeText(window.quizState.currentItem.translation);

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                window.showToast(window.uiLang === 'es' ? 'Tu navegador bloquea el micrófono' : 'Browser blocks microphone');
                btn.style.background = 'var(--gold)'; 
                btn.innerText = '🎤';
                return;
            }

            const rec = new SpeechRecognition();
            rec.lang = langCode;
            rec.onresult = (e) => {
                rec.stop(); 
                const spokenText = e.results[0][0].transcript;
                const cleanSpoken = normalizeText(spokenText);
                window.handleVoiceQuizResult(cleanSpoken === targetTextClean, spokenText);
            };
            rec.onerror = (e) => { 
                console.log("Mic error", e);
                btn.style.background = 'var(--gold)'; 
                btn.innerText = '🎤'; 
                window.showToast(window.uiLang === 'es' ? 'Error de micrófono' : 'Microphone error');
            };
            
            try {
                rec.start();
            } catch(e) {
                console.log("Already started", e);
            }
        };

        window.handleVoiceQuizResult = function(isCorrect, spokenText) {
            const feedback = document.getElementById('quiz-voice-feedback');
            const micBtn = document.getElementById('quiz-mic-btn');
            const heading = document.getElementById('quiz-result-heading');
            const target = window.quizState.currentItem.translation;
            const skipBtn = document.getElementById('quiz-skip-btn');

            if (isCorrect) {
                micBtn.style.background = '#2e7d32'; 
                micBtn.innerText = '🎤';
                heading.innerHTML = `<span style="color:#4caf50;">${window.uiLang === 'es' ? '¡Correcto!' : 'Correct!'}</span>`;
                feedback.innerHTML = `<span style="color:var(--text-navy); font-weight:600;">${window.uiLang === 'es' ? 'Escuché:' : 'I heard:'} "${window.escHtml(spokenText)}"</span>`;
                
                if (skipBtn) skipBtn.style.display = 'none';
                let getsPoint = !window.quizState.hasFailedCurrent;
                window.checkQuizAnswer(null, getsPoint, true);
            } else {
                micBtn.style.background = '#c62828'; 
                micBtn.innerText = '🎤';
                if (!window.quizState.hasFailedCurrent) window.quizState.hasFailedCurrent = true;
                
                heading.innerHTML = `<span style="color:#ef5350;">${window.uiLang === 'es' ? '¡Casi!' : 'Almost!'}</span>`;
                
                feedback.innerHTML = `
                    <div style="margin-bottom:12px;">
                        <span style="color:rgba(26,26,62,0.7); font-size: 14px;">${window.uiLang === 'es' ? 'Traducción esperada:' : 'Expected translation:'}</span><br>
                        <span style="color:var(--text-navy); font-size:20px; font-weight:bold;">"${window.escHtml(target)}"</span>
                    </div>
                    <div style="margin-bottom:16px;">
                        <span style="color:rgba(26,26,62,0.7); font-size: 14px;">${window.uiLang === 'es' ? 'Lo que escuché:' : 'What I heard:'}</span><br>
                        <span style="color:#ef5350; font-size:18px; font-weight:600;">"${window.escHtml(spokenText)}"</span>
                    </div>
                    <div style="color:var(--text-navy); font-size:15px; font-weight:600; background:rgba(255,255,255,0.6); padding:8px 12px; border-radius:8px; display:inline-block; border: 1px solid rgba(26,26,62,0.2);">
                        👆 ${window.uiLang === 'es' ? 'Toca el micrófono para intentar de nuevo' : 'Tap the mic to try again'}
                    </div>
                `;
                
                window.quizState.isAnswering = false; 
                if (skipBtn) {
                    skipBtn.style.display = 'inline-block';
                    skipBtn.innerText = window.uiLang === 'es' ? 'Rendirse y continuar' : 'Give up and continue';
                }
            }
        };

        window.checkQuizAnswer = function(btn, isCorrect, isVoiceRetrySuccess = false) {
            if (window.quizState.isAnswering) return; 
            window.quizState.isAnswering = true;

            if (btn) {
                const btns = document.querySelectorAll('.quiz-option-btn');
                btns.forEach(b => b.disabled = true); 
                if (isCorrect) {
                    btn.style.background = '#2e7d32'; 
                    btn.style.borderColor = '#4caf50';
                    btn.style.color = 'white';
                    window.showToast(window.uiLang === 'es' ? '¡Correcto!' : 'Correct!');
                } else {
                    btn.style.background = '#c62828'; 
                    btn.style.borderColor = '#ef5350';
                    btn.style.color = 'white';
                    window.showToast(window.uiLang === 'es' ? 'Incorrecto' : 'Incorrect');
                    btns.forEach(b => {
                        if (b.getAttribute('onclick').includes('true')) {
                            b.style.background = '#2e7d32';
                            b.style.borderColor = '#4caf50';
                            b.style.color = 'white';
                        }
                    });
                }
            } else {
                if(isCorrect) window.showToast(window.uiLang === 'es' ? '¡Correcto!' : 'Correct!');
                else if(isVoiceRetrySuccess) window.showToast(window.uiLang === 'es' ? '¡Bien pronunciado! (Modo práctica)' : 'Well pronounced! (Practice mode)');
                else window.showToast(window.uiLang === 'es' ? 'Incorrecto' : 'Incorrect');
            }

            let history = JSON.parse(localStorage.getItem('app_history') || '[]');
            let itemIndex = history.findIndex(i => i.original === window.quizState.currentItem.original);

            if (itemIndex > -1) {
                if (isCorrect) {
                    window.quizState.score++;
                    history[itemIndex].mastery = Math.min(5, (history[itemIndex].mastery || 0) + 1);
                } else {
                    if (!window.quizState.hasFailedCurrent || !isVoiceRetrySuccess) {
                        history[itemIndex].mastery = 0; 
                    }
                }
                localStorage.setItem('app_history', JSON.stringify(history));
                window.updateCloudMastery(history[itemIndex]); 
            }

            window.quizState.currentQuestion++; 
            
            const nextBtn = document.getElementById('quiz-next-btn');
            if(nextBtn) nextBtn.style.display = 'inline-block';

            const skipBtn = document.getElementById('quiz-skip-btn');
            if(skipBtn) skipBtn.style.display = 'none';
        };

        window.showQuizResults = function() {
            const container = document.getElementById('quiz-content');
            document.getElementById('quiz-score').style.display = 'none'; 
            
            let percentage = (window.quizState.score / window.quizState.maxQuestions) * 100;
            let emoji = '🎉';
            let message = window.uiLang === 'es' ? '¡Excelente trabajo!' : 'Excellent job!';
            
            if (percentage < 50) {
                emoji = '💪';
                message = window.uiLang === 'es' ? '¡Sigue practicando!' : 'Keep practicing!';
            }

            container.innerHTML = `
                <div style="text-align:center; width:100%; animation: popIn 0.5s ease-out;">
                    <div style="font-size:80px; margin-bottom:10px;">${emoji}</div>
                    <h2 style="color:var(--text-navy); font-size:32px; margin-bottom:5px;">${message}</h2>
                    <p style="color:var(--text-navy); font-size:20px; font-weight:600; margin-bottom:40px;">
                        ${window.uiLang === 'es' ? 'Puntuación:' : 'Score:'} <strong style="color:var(--gold); font-size:28px;">${window.quizState.score} / ${window.quizState.maxQuestions}</strong>
                    </p>
                    <button onclick="window.nextQuizQuestion()" style="background:linear-gradient(180deg, var(--navy-light) 0%, var(--navy) 100%); color:white; font-weight:700; border:none; border-radius:30px; padding:16px 40px; font-size:20px; cursor:pointer; box-shadow:0 6px 15px rgba(0,0,0,0.4);">
                        ${window.uiLang === 'es' ? 'Volver a Jugar' : 'Play Again'}
                    </button>
                </div>
            `;
            window.quizState.currentQuestion = 0;
            window.quizState.score = 0;
        };

        document.addEventListener('DOMContentLoaded', () => {
            window.nextQuizQuestion();
        });
    </script>
</body>
</html>
